    <circle cx="288" cy="260" r="170" fill="#84643b" opacity=".15" filter="url(#soft)"/>
    <path d="M300 213c-62 16-92 70-81 134 9 53 51 92 103 101 44 7 89-10 118-44-34 9-65 2-88-21-33-33-42-91-26-170z" fill="#0c0a08" opacity=".96"/>
    <path d="M342 230c-16 18-20 47-10 71 13 32 45 45 82 35-11 24-36 44-68 44-52 0-86-43-81-92 4-36 30-59 77-58z" fill="#1b1711" opacity=".9"/>
    <path d="M263 407c38-10 86-4 125 18 29 17 50 40 62 68H184c13-43 42-72 79-86z" fill="#11100e"/>
    <path d="M239 432l34 36 30-54 33 55 38-38 12 107H225z" fill="#181510"/>
