    <text x="298" y="520" text-anchor="middle" class="serif" font-size="44" letter-spacing="10" fill="#f4ead8">今 晚</text>
    <text x="298" y="572" text-anchor="middle" class="serif" font-size="27" letter-spacing="5" fill="#eee2cd">讓紳士照顧你的疲憊</text>
