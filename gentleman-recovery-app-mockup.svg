  <!-- phone 1 -->
  <rect x="100" y="100" width="396" height="800" rx="58" fill="#050504" stroke="#8f6c3b" stroke-width="2" filter="url(#shadow)"/>
  <rect x="118" y="120" width="360" height="760" rx="44" fill="url(#panel)" stroke="#30261a"/>
