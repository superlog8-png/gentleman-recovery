<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="18%" r="70%">
      <stop offset="0%" stop-color="#2b241b"/>
      <stop offset="42%" stop-color="#080706"/>
      <stop offset="100%" stop-color="#020202"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0dcad"/>
      <stop offset="42%" stop-color="#b89452"/>
      <stop offset="100%" stop-color="#7c5a2d"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#15120e"/>
      <stop offset="100%" stop-color="#070605"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#000000" flood-opacity="0.62"/>
    </filter>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="24"/>
    </filter>
    <pattern id="noise" width="120" height="120" patternUnits="userSpaceOnUse">
      <rect width="120" height="120" fill="#000"/>
      <circle cx="12" cy="18" r="1" fill="#f2deb0" opacity="0.08"/>
      <circle cx="78" cy="33" r="1.4" fill="#fff5d5" opacity="0.05"/>
      <circle cx="38" cy="91" r="1.1" fill="#c8a15d" opacity="0.07"/>
      <circle cx="101" cy="74" r="0.9" fill="#ffffff" opacity="0.04"/>
    </pattern>
    <clipPath id="phoneClip1"><rect x="118" y="120" width="360" height="760" rx="44"/></clipPath>
    <clipPath id="phoneClip2"><rect x="620" y="120" width="360" height="760" rx="44"/></clipPath>
    <clipPath id="phoneClip3"><rect x="1122" y="120" width="360" height="760" rx="44"/></clipPath>
    <style>
      .serif{font-family:"Noto Serif TC","PMingLiU","Times New Roman",serif}
      .sans{font-family:"Noto Sans TC","Microsoft JhengHei",Arial,sans-serif}
      .muted{fill:#b8a98f}
      .gold{fill:url(#gold)}
      .line{stroke:#9f7b42;stroke-width:1;opacity:.7}
      .thin{stroke:#e9d09a;stroke-width:1;opacity:.55}
      .body{fill:#eee4d2}
      .small{font-size:18px;letter-spacing:1px}
      .label{font-size:17px;letter-spacing:1px;fill:#b9ad99}
      .title{font-size:48px;letter-spacing:8px;fill:#efe2c3}
      .phoneTitle{font-size:31px;letter-spacing:4px;fill:#f0dfbc}
      .caption{font-size:15px;letter-spacing:1px;fill:#9f927d}
    </style>
  </defs>

  <rect width="1600" height="1000" fill="url(#bgGlow)"/>
  <rect width="1600" height="1000" fill="url(#noise)" opacity="0.45"/>
  <circle cx="1290" cy="160" r="230" fill="#8a6b3e" opacity="0.11" filter="url(#soft)"/>
  <circle cx="260" cy="820" r="260" fill="#b89452" opacity="0.07" filter="url(#soft)"/>

  <text x="800" y="70" text-anchor="middle" class="serif title">紳 士 按 摩 APP 視 覺 規 劃</text>
